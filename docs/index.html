<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-V676BWPVGJ"
    ></script>
    <script>
    "use strict";
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      // biome-ignore lint/correctness/noUndeclaredVariables: standard gtag snippet
      // biome-ignore lint/complexity/noArguments: standard gtag snippet
      dataLayer.push(arguments);
    }
    gtag("js", new Date());

    gtag("config", "G-V676BWPVGJ");
    </script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
      rel="stylesheet"
      href="https://unpkg.com/spectre.css/dist/spectre.min.css"
    >
    <link
      rel="stylesheet"
      href="https://unpkg.com/spectre.css/dist/spectre-exp.min.css"
    >
    <link
      rel="stylesheet"
      href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css"
    >
    <link
      href="https://fonts.googleapis.com/css?family=Ubuntu"
      rel="stylesheet"
    >
    <style type="text/css">
    body {
      padding: 5ch;
      font-family: "Ubuntu", sans-serif;
      font-size: medium;
      color: #d4d4d4;
      background-color: #1e1e1e;
    }
    .card-body {
      min-height: 86px;
    }
    .bg-blue {
      background-color: rgb(62, 180, 205);
    }
    .text-white {
      color: white;
    }
    .panel {
      margin-bottom: 46px;
    }
    .column {
      margin-bottom: 16px;
    }
    .card {
      height: 100%;
      border: 0;
      box-shadow: 0 0.25rem 1rem rgb(48 55 66 / 15%);
    }
    </style>
  </head>

  <body>
    <div class="container grid-lg">
      <div class="tile tile-centered">
        <div class="tile-icon">
          <img
            src="https://github.com/davidnussio/vscode-jq-playground/raw/master/images/icon.png"
            alt="jq playground logo"
            height="72"
          >
        </div>
        <div class="tile-content">
          <div class="tile-title"><span class="h2">Playground</span></div>
          <span class="tile-subtitle text-gray"
            >Create interactive jq filters notebook.</span
          >
        </div>
      </div>

      <div class="my-2"></div>

      <div class="panel">
        <div class="panel-header bg-blue">
          <div class="panel-title text-white">Getting started</div>
        </div>
        <div class="panel-body">
          <div class="columns">
            <!-- CARD 1 -->
            <div class="column col-12">
              <div class="card mt-2">
                <div class="card-header">
                  <div class="card-title h5 text-dark">
                    Create jq playground from query
                  </div>
                </div>
                <div class="card-image">
                  <img
                    src="https://github.com/davidnussio/vscode-jq-playground/raw/master/images/inputbox-1.gif"
                    alt="Input box demo"
                    class="img-responsive"
                  >
                </div>
              </div>
            </div>

            <!-- CARD 1 -->
            <div class="column col-12">
              <div class="card mt-2">
                <div class="card-header">
                  <div class="card-title h5 text-dark">Filter on the fly</div>
                </div>
                <div class="card-image">
                  <img
                    src="https://github.com/davidnussio/vscode-jq-playground/raw/master/images/inputbox-2.gif"
                    alt="Filter on the fly demo"
                    class="img-responsive"
                  >
                </div>
              </div>
            </div>

            <!-- CARD 1 -->
            <div class="column col-12">
              <div class="card mt-2">
                <div class="card-header">
                  <div class="card-title h5 text-dark">
                    Redirect output to file
                  </div>
                </div>
                <div class="card-image">
                  <img
                    src="https://github.com/davidnussio/vscode-jq-playground/raw/master/images/demo-redirect.gif"
                    alt="Output redirect demo"
                    class="img-responsive"
                  >
                </div>
              </div>
            </div>

            <!-- CARD 2 -->
            <div class="column col-12">
              <div class="card mt-2">
                <div class="card-header">
                  <div class="card-title h5 text-dark">
                    Use variables and environment variables into commands
                  </div>
                </div>
                <div class="card-image">
                  <img
                    src="https://github.com/davidnussio/vscode-jq-playground/raw/master/images/demo-variables.gif"
                    alt="Variables demo"
                    class="img-responsive"
                  >
                </div>
              </div>
            </div>

            <!-- CARD 3 -->
            <div class="column col-12">
              <div class="card mt-2">
                <div class="card-header">
                  <div class="card-title h5 text-dark">Use input variable</div>
                </div>
                <div class="card-image">
                  <img
                    src="https://github.com/davidnussio/vscode-jq-playground/raw/master/images/input-variable.gif"
                    alt="Input variable demo"
                    class="img-responsive"
                  >
                </div>
              </div>
            </div>

            <!-- CARD 4 -->
            <div class="column col-12">
              <div class="card mt-2">
                <div class="card-header">
                  <div class="card-title h5 text-dark">...</div>
                </div>
                <div class="card-image">
                  <img
                    src="https://github.com/davidnussio/vscode-jq-playground/raw/master/images/command-line-1.gif"
                    alt="Command line demo"
                    class="img-responsive"
                  >
                </div>
              </div>
            </div>

            <!-- CARD 5 -->
            <div class="column col-12">
              <div class="card mt-2">
                <div class="card-header">
                  <div class="card-title h5 text-dark">Multiline filter</div>
                </div>
                <div class="card-image">
                  <img
                    src="https://github.com/davidnussio/vscode-jq-playground/raw/master/images/multiline.png"
                    alt="Multiline query syntax"
                    class="img-responsive"
                  >
                </div>
              </div>
            </div>

            <!-- CARD 6 -->
            <div class="column col-12">
              <div class="card mt-2">
                <div class="card-header">
                  <div class="card-title h5 text-dark">Multiline filter #2</div>
                </div>
                <div class="card-image">
                  <img
                    src="https://github.com/davidnussio/vscode-jq-playground/raw/master/images/multiline-demo.gif"
                    alt="Multiline query demo"
                    class="img-responsive"
                  >
                </div>
              </div>
            </div>

            <!-- CARD 7 -->
            <div class="column col-md-12 col-6">
              <div class="card mt-2">
                <div class="card-header">
                  <div class="card-title h5 text-dark">Syntax highlight</div>
                </div>
                <div class="card-image">
                  <img
                    src="https://github.com/davidnussio/vscode-jq-playground/raw/master/images/highlight.png"
                    alt="Syntax highlighting"
                    class="img-responsive"
                  >
                </div>
              </div>
            </div>

            <!-- CARD 8 -->
            <div class="column col-md-12 col-6">
              <div class="card mt-2">
                <div class="card-header">
                  <div class="card-title h5 text-dark">Autocomplete</div>
                </div>
                <div class="card-image">
                  <img
                    src="https://github.com/davidnussio/vscode-jq-playground/raw/master/images/autocomple-1.png"
                    alt="Autocomplete suggestions"
                    class="img-responsive"
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
